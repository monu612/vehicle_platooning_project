name: Python Package using Conda

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Add conda to system path
      run: |
        # $CONDA is an environment variable pointing to the root of the miniconda directory
        echo $CONDA/bin >> $GITHUB_PATH
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" flake8 mypy types-networkx
    - name: Lint with flake8 and mypy
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 aco.py simulation.py network.py final_plots.py vehicle_animation.py visualization.py tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 aco.py simulation.py network.py final_plots.py vehicle_animation.py visualization.py tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        mypy --ignore-missing-imports aco.py simulation.py
    - name: Test with pytest
      run: |
        pytest
